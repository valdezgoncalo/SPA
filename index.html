<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA Fiscalização - v18 Pro-Print</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --spa-red: #cc0000; --dark: #1a1a1a; --bg: #f4f7f6; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--dark); padding-bottom: 60px; }
        
        /* Interface App */
        .header { background: var(--spa-red); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tabs { display: flex; background: white; border-bottom: 2px solid var(--spa-red); position: sticky; top: 50px; z-index: 999; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; color: #777; font-size: 0.7rem; text-transform: uppercase; }
        .tab.active { background: var(--spa-red); color: white; }
        
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid var(--spa-red); }
        
        h2 { font-size: 0.8rem; color: var(--spa-red); text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 15px; letter-spacing: 0.5px; }
        label { display: block; margin-top: 12px; font-size: 0.65rem; font-weight: bold; color: #555; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .canvas-box { border: 1px dashed #bbb; background: #fdfdfd; width: 100%; height: 160px; touch-action: none; border-radius: 8px; }
        .btn-main { width: 100%; background: var(--spa-red); color: white; border: none; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 20px; }
        .check-item { display: flex; align-items: center; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 5px; font-size: 0.8rem; }
        .check-item input { width: auto; margin-right: 12px; transform: scale(1.2); }

        /* ESTILO DO RELATÓRIO (PDF/PRINT) */
        #print-area { display: none; background: white; color: black; }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            #print-area { display: block !important; padding: 0; }
            .print-page { padding: 40px; border: 1px solid #eee; min-height: 290mm; position: relative; }
            .print-header { border-bottom: 3px solid var(--spa-red); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
            .print-section { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 4px; }
            .print-section h3 { margin: -15px -15px 15px -15px; background: #f0f0f0; padding: 8px 15px; font-size: 10pt; border-bottom: 1px solid #ccc; text-transform: uppercase; }
            .print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 10pt; }
            .data-row { margin-bottom: 5px; border-bottom: 1px dotted #eee; padding-bottom: 2px; }
            .label-print { font-weight: bold; font-size: 8pt; color: #666; text-transform: uppercase; display: block; }
            .canvas-img { border: 1px solid #eee; max-width: 100%; height: auto; margin-top: 10px; }
            .footer-sig { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 30px; text-align: center; font-size: 9pt; }
            .sig-box { border-top: 1px solid #000; padding-top: 5px; margin-top: 80px; }
        }
    </style>
</head>
<body>

<div class="header no-print">
    <h1 style="margin:0; font-size: 1rem; letter-spacing: 1px;">SPA - FISCALIZAÇÃO DIGITAL</h1>
</div>

<div class="tabs no-print">
    <div class="tab active" onclick="switchTab('nova')">📝 Novo Auto</div>
    <div class="tab" onclick="switchTab('historico')">📂 Histórico</div>
</div>

<div class="container no-print">
    <div id="view-nova">
        <div class="card">
            <h2>📍 Campo & Contacto</h2>
            <div class="grid">
                <div><label>GPS</label><input type="text" id="gps-coords" readonly></div>
                <div><label>Entrada</label><input type="time" id="h-entrada"></div>
            </div>
            <label>Pessoa Contactada / Responsável</label>
            <input type="text" id="p-contactada" placeholder="Nome completo">
            <div class="grid">
                <div><label>Telemóvel</label><input type="tel" id="tel-cont"></div>
                <div><label>E-mail</label><input type="email" id="email-cont"></div>
            </div>
        </div>

        <div class="card">
            <h2>🏢 Estabelecimento</h2>
            <label>Tipologia de Local</label>
            <select id="categoria-local">
                <option value="Hotelaria e Similares">Hotelaria e Similares</option>
                <option value="Bebidas/Restauração COM dança">Bebidas/Restauração COM espaço de dança</option>
                <option value="Bebidas/Restauração SEM dança">Bebidas/Restauração SEM espaço de dança</option>
                <option value="Estabelecimento Comercial / Geral">Comercial / Geral</option>
            </select>
            <label>Firma / Denominação</label>
            <input type="text" id="firma" placeholder="Nome oficial">
            <div class="grid">
                <div><label>NIF</label><input type="number" id="nif"></div>
                <div><label>CAE</label><input type="text" id="cae"></div>
            </div>
            <div class="grid">
                <div><label>Lotação</label><input type="number" id="lotacao"></div>
                <div><label>Área (m²)</label><input type="number" id="area"></div>
            </div>
        </div>

        <div class="card">
            <h2>⚡ Funções & Provas</h2>
            <div id="funcoes-list">
                <label class="check-item"><input type="checkbox" value="TV Cabo / Satélite"> TV Cabo / Satélite</label>
                <label class="check-item"><input type="checkbox" value="Música Ambiente s/ DJ"> Música Ambiente sem DJ</label>
                <label class="check-item"><input type="checkbox" value="Dj's Residentes / Baile"> Dj's Residentes / Baile</label>
                <label class="check-item"><input type="checkbox" value="Fados"> Fados</label>
                <label class="check-item"><input type="checkbox" value="Karaoke"> Karaoke</label>
                <label class="check-item"><input type="checkbox" value="Concerto / Variedades"> Concerto / Variedades</label>
            </div>
            <label style="margin-top:15px;">Obras / Canais Identificados</label>
            <textarea id="obras" rows="3" placeholder="Ex: CNN, RFM, Músicas X..."></textarea>
            <label class="check-item" style="margin-top:10px; background:#eef9ff;">
                <input type="checkbox" id="brochura"> Brochura explicada e entregue
            </label>
        </div>

        <div class="card">
            <h2>📐 Croqui & Assinatura</h2>
            <label>Mapa do Recinto</label>
            <canvas id="canvas-croqui" class="canvas-box"></canvas>
            <label style="margin-top:15px;">Assinatura Digital</label>
            <canvas id="canvas-sig" class="canvas-box" style="height:100px;"></canvas>
            
            <button class="btn-main" onclick="gerarAuto()">FINALIZAR E IMPRIMIR</button>
        </div>
    </div>

    <div id="view-historico" style="display:none;">
        <div id="lista-hist"></div>
    </div>
</div>

<div id="print-area"></div>

<script>
    let db = JSON.parse(localStorage.getItem('spa_pro_v18')) || [];

    // GPS
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            document.getElementById('gps-coords').value = `${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
        });
    }

    function switchTab(t) {
        document.getElementById('view-nova').style.display = t === 'nova' ? 'block' : 'none';
        document.getElementById('view-historico').style.display = t === 'historico' ? 'block' : 'none';
        if(t === 'historico') renderHist();
    }

    function initCanvas(id) {
        const c = document.getElementById(id); const ctx = c.getContext('2d');
        let d = false;
        c.width = c.offsetWidth; c.height = c.offsetHeight;
        const getP = (e) => {
            const r = c.getBoundingClientRect();
            return { x: (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - r.left, y: (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - r.top };
        };
        const start = (e) => { d = true; ctx.beginPath(); ctx.moveTo(getP(e).x, getP(e).y); };
        const move = (e) => { if(d) { ctx.lineTo(getP(e).x, getP(e).y); ctx.stroke(); e.preventDefault(); } };
        c.addEventListener('mousedown', start); c.addEventListener('mousemove', move); window.addEventListener('mouseup', () => d = false);
        c.addEventListener('touchstart', start); c.addEventListener('touchmove', move);
    }
    initCanvas('canvas-croqui'); initCanvas('canvas-sig');

    function gerarAuto() {
        const data = {
            id: Date.now(),
            firma: document.getElementById('firma').value || "Não Declarado",
            nif: document.getElementById('nif').value,
            cae: document.getElementById('cae').value,
            tipo: document.getElementById('categoria-local').value,
            contactada: document.getElementById('p-contactada').value,
            tel: document.getElementById('tel-cont').value,
            email: document.getElementById('email-cont').value,
            gps: document.getElementById('gps-coords').value,
            hora: document.getElementById('h-entrada').value,
            obras: document.getElementById('obras').value,
            lotacao: document.getElementById('lotacao').value,
            funcoes: Array.from(document.querySelectorAll('#funcoes-list input:checked')).map(c => c.value),
            croqui: document.getElementById('canvas-croqui').toDataURL(),
            sig: document.getElementById('canvas-sig').toDataURL(),
            data: new Date().toLocaleDateString('pt-PT')
        };
        db.unshift(data);
        localStorage.setItem('spa_pro_v18', JSON.stringify(db));
        
        montarFolhaPrint(data);
        setTimeout(() => { window.print(); }, 500);
    }

    function renderHist() {
        document.getElementById('lista-hist').innerHTML = db.map(i => `
            <div class="card" style="border-left:8px solid var(--spa-red);">
                <strong>${i.firma}</strong><br><small>${i.data} - ID:${i.id}</small>
                <button class="btn-main" style="padding:8px; font-size:0.7rem; background:#444;" onclick="reimprimir(${i.id})">VER RELATÓRIO</button>
            </div>
        `).join('');
    }

    function reimprimir(id) {
        montarFolhaPrint(db.find(x => x.id === id));
        setTimeout(() => { window.print(); }, 500);
    }

    function montarFolhaPrint(i) {
        document.getElementById('print-area').innerHTML = `
            <div class="print-page">
                <div class="print-header">
                    <div>
                        <h1 style="color:red; margin:0; font-size:22pt;">SPA</h1>
                        <p style="margin:0; font-size:8pt; letter-spacing:1px;">SOCIEDADE PORTUGUESA DE AUTORES</p>
                    </div>
                    <div style="text-align:right;">
                        <p style="margin:0; font-weight:bold;">AUTO DE FISCALIZAÇÃO Nº ${i.id}</p>
                        <p style="margin:0; font-size:9pt; color:#666;">Data: ${i.data} | Hora: ${i.hora}</p>
                    </div>
                </div>

                <div class="print-section">
                    <h3>Identificação do Estabelecimento</h3>
                    <div class="print-grid">
                        <div class="data-row"><span class="label-print">Denominação / Firma</span>${i.firma}</div>
                        <div class="data-row"><span class="label-print">Tipo de Local</span>${i.tipo}</div>
                        <div class="data-row"><span class="label-print">NIF</span>${i.nif || '---'}</div>
                        <div class="data-row"><span class="label-print">CAE</span>${i.cae || '---'}</div>
                        <div class="data-row"><span class="label-print">Lotação</span>${i.lotacao || '---'} pax</div>
                        <div class="data-row"><span class="label-print">Coordenadas GPS</span>${i.gps}</div>
                    </div>
                </div>

                <div class="print-section">
                    <h3>Pessoa Contactada / Contactos</h3>
                    <div class="print-grid">
                        <div class="data-row"><span class="label-print">Nome Completo</span>${i.contactada || '---'}</div>
                        <div class="data-row"><span class="label-print">Telemóvel</span>${i.tel || '---'}</div>
                        <div class="data-row" style="grid-column: span 2;"><span class="label-print">E-mail</span>${i.email || '---'}</div>
                    </div>
                </div>

                <div class="print-section">
                    <h3>Utilização Artística Detetada</h3>
                    <p style="font-size:10pt;"><b>Funções:</b> ${i.funcoes.join(', ') || 'Nenhuma'}</p>
                    <p style="font-size:10pt;"><b>Obras/Canais:</b> ${i.obras || 'Sem registo'}</p>
                </div>

                <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:20px;">
                    <div>
                        <span class="label-print">Croqui de Localização (Colunas/Equipamentos)</span>
                        <img src="${i.croqui}" class="canvas-img">
                    </div>
                    <div style="text-align:center;">
                        <span class="label-print">QR Code de Autenticação</span>
                        <div id="print-qr" style="margin-top:10px; display:inline-block;"></div>
                    </div>
                </div>

                <div class="footer-sig">
                    <div>
                        <div class="sig-box">Assinatura do Inspetor</div>
                    </div>
                    <div>
                        <img src="${i.sig}" style="max-height:60px; margin-bottom:-20px;"><br>
                        <div class="sig-box">Assinatura do Responsável</div>
                    </div>
                </div>
            </div>
        `;
        new QRCode(document.getElementById("print-qr"), { text: "SPA-VALID-"+i.id, width: 90, height: 90 });
    }
</script>
</body>
</html>
